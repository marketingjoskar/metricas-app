server {
    listen 80;
    
    # Directorio donde se copiará el build (estándar de Nginx en Docker)
    root /usr/share/nginx/html;
    index index.html;

    # Compresión Gzip para mejorar rendimiento
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # React SPA — todas las rutas van a index.html si no existe el archivo físico
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos (JS, CSS, Imágenes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Seguridad básica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
